experiment:
  name: baseline
  mode: within_subject
  output_root: outputs

clip:
  variant: ViT-H-14
  registry_config: data_config.json

model:
  encoder_type: NCT_C
  subject_conditioning: auto

ubp:
  target_space: curriculum
  mode: curriculum
  lambda_mu: 0.5
  lambda_tau: 0.1
  curriculum_start_level: 4.0
  curriculum_end_level: 0.0
  curriculum_begin_epoch: 0
  curriculum_end_epoch: -1
  hybrid_switch_epoch: -1
  orig_mix_ratio: 0.0

data:
  data_path: /path/to/eeg_data_root
  subjects:
    - sub-01
    - sub-02
    - sub-03
    - sub-04
    - sub-05
    - sub-06
    - sub-07
    - sub-08
    - sub-09
    - sub-10
  target_subject: null
  avg: true
  selected_ch: null
  time_window: [null, null]

train:
  seed: 3047
  deterministic: false
  lr: 0.0002
  epochs: 100
  batch_size: 1024
  gpu: cuda:0
  device: gpu
  alpha: 0.99
  emb_size: 256
  num_heads: 4
  dropout: 0.7
  warmup_epochs: 5
  weight_decay: 0.05
  patience: 15
  pretrained_path: null
